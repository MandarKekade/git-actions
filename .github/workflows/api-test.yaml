name: Bruno API Tests

on:
  pull_request:
    branches: [ master ]
  push:
    branches: [ master ]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  bruno-tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - run: mkdir -p reports

      - name: Install Bruno CLI
        run: npm install -g @usebruno/cli@3.5.0

      - name: Run Bruno collection
        run: |
          mkdir -p reports
          bru run \
            --workspace-path . \
            --env-var platform_name="GitHub Actions" \
            --env-var build_id="${{ github.run_id }}" \
            --env-var commit_sha="${{ github.sha }}" \
            --reporter-html reports/github-actions-report.html

      - uses: actions/upload-artifact@v6
        if: ${{ !cancelled() }}
        with:
          name: bruno-report
          path: reports/github-actions-report.html
          if-no-files-found: error